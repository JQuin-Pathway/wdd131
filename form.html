<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131 - Form Assignment. Trying out new css colors and labels to practice for my final project next week.">
    <meta name="author" content="Jackson Quinton">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <script src="/scripts/getdates.js" defer></script>
    <title>Product Review Form Assignment</title>
</head>
<body>

    <div>
        <header>
            <h1>Product Review</h1>
        </header>
        <main>
            <form method="get" action="review.html">
                <div>
                    <label for="product-name">Product Name</label>
                    <select id="product-name" name="productName" required>
                        <option value="" disabled selected>Select a Product ...</option>
                    </select>
                </div>
                <div>
                    <label>Overall Rating</label>
                    <div>
                        <div>
                            <label for="rate1">☆</label>
                            <input type="radio" id="rate1" name="rating" value="1" required>
                        </div>
                        <div>
                            <label for="rate2">☆☆</label>
                            <input type="radio" id="rate2" name="rating" value="2" required>
                        </div>
                        <div>
                            <label for="rate3">☆☆☆</label>
                            <input type="radio" id="rate3" name="rating" value="3" required>
                        </div>
                        <div>
                            <label for="rate4">☆☆☆☆</label>
                            <input type="radio" id="rate4" name="rating" value="4" required>
                        </div>
                        <div>
                            <label for="rate5">☆☆☆☆☆</label>
                            <input type="radio" id="rate5" name="rating" value="5" required>
                        </div>
                    </div>
                </div>
                <div>
                    <label for="install-date">Date of Installation</label>
                    <input type="date" id="install-date" name="installDate" max="9999-12-31" required>
                </div>
                <div>
                    <label>Which features did you find useful in the product?<br><span>(Check all that apply)</span></label>
                    <div>
                        <label for="feat-durability">
                            <input type="checkbox" id="feat-durability" name="features" value="durability"> Durability
                        </label>
                        <label for="feat-ease">
                            <input type="checkbox" id="feat-ease" name="features" value="ease_of_use"> Ease of Use
                        </label>
                        <label for="feat-performance">
                            <input type="checkbox" id="feat-performance" name="features" value="performance"> Performance
                        </label>
                        <label for="feat-design">
                            <input type="checkbox" id="feat-design" name="features" value="design"> Design
                        </label>
                    </div>
                </div>
                <div>
                    <label for="written-review">Written Review <span>(Optional)</span></label>
                    <textarea id="written-review" name="writtenReview"></textarea>
                </div>
                <div>
                    <label for="user-name">Your Name <span>(Optional)</span></label>
                    <input type="text" id="user-name" name="userName">
                </div>
                <button type="submit">Post Review</button>
            </form>
        </main>
        <footer>
            <p>©<span id="year"></span> | Jackson G Quinton | Arizona</p>
            <p>Last Modification: <span id="lastModified"></span></p>
        </footer>
    </div>
</body>
</html>
