<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131 - Form submission tracking page to review product reviews.">
    <meta name="author" content="Jackson Quinton">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="/scripts/review.js" defer></script>
    <script src="/scripts/getdates.js" defer></script>
    <title>Review Page</title>
</head>
<body>

    <div>
        <header>
            <h1>Review Confirmation</h1>
        </header>
        <main class="confirmation-container">
            <div class="confirmation-icon">✓</div>
            <h2 class="confirmation-title">Thank You!</h2>
            <p class="confirmation-text">Your product review has been successfully processed and submitted.</p>
            
            <div class="counter-box">
                <p>Total Reviews Completed: <span id="review-counter-display" class="counter-count">0</span></p>
            </div>

            <a href="form.html" class="btn-link">Submit Another Review</a>
        </main>
        <footer>
            <p>©<span id="year"></span> | Jackson G Quinton | Arizona</p>
            <p>Last Modification: <span id="lastModified"></span></p>
        </footer>
    </div>

</body>
</html>
